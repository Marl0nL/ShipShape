# squid.conf — ShipShape egress proxy
#
# Default-DENY allow-list model. The allow-list lives in an external file
# (allowed_domains.txt) that the host control plane owns. Changes are applied
# LIVE with `docker exec egress-proxy squid -k reconfigure` — no restart, no
# dropped connections.

visible_hostname egress-proxy

# ----------------------------------------------------------------------
# 1. LOGGING (audit trail + the denial feed the TUI turns into requests)
# ----------------------------------------------------------------------
# Log every request to stdout so `docker logs egress-proxy` captures it.
# NOTE: for HTTPS this records the CONNECT target (host:443) only, not the
# full URL — there is no TLS interception here (by design; SSL-bump breaks
# cert pinning and is invasive). Domain-level auditing is what you get.
logformat agent_audit %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log stdio:/dev/stdout agent_audit

# Denied requests are tagged TCP_DENIED in %Ss above. The control plane greps
# the log for these and surfaces the domain as a one-click "pending request".

# Privacy / hygiene: don't advertise ourselves or leak client addresses,
# and don't cache agent traffic.
via off
forwarded_for delete
httpd_suppress_version_string on
cache deny all

# ----------------------------------------------------------------------
# 2. SAFETY ACLs (restore the guards lost by replacing the default config)
# ----------------------------------------------------------------------
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports  port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl CONNECT    method CONNECT

# Never serve unsafe ports, and only ever tunnel (CONNECT) to 443. Without
# these the agent could CONNECT out to arbitrary ports (SSH, SMTP, IRC…).
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ----------------------------------------------------------------------
# 3. EGRESS ALLOW-LIST (default-deny)
# ----------------------------------------------------------------------
# One domain per line. A leading dot (.github.com) matches all subdomains.
# Managed by the host control plane; hand-editable, then `squid -k reconfigure`.
acl allowed_domains dstdomain "/etc/squid/shipshape/allowed_domains.txt"

http_access allow localnet allowed_domains
# Everything else from the sandbox is denied — and logged as a request candidate.
http_access deny all

# ----------------------------------------------------------------------
# 4. THROTTLING / DELAY POOLS  (raised to ~20 MB/s aggregate)
# ----------------------------------------------------------------------
delay_pools 1
delay_class 1 1
# 20 MB/s = 20971520 bytes/s. Format: restore_rate/maximum_bucket_size.
delay_parameters 1 20971520/20971520
delay_access 1 allow localnet

# ----------------------------------------------------------------------
# 5. DNS
# ----------------------------------------------------------------------
# Squid resolves names itself. For VPN-only INTERNAL hostnames (Option A),
# point Squid at your internal resolver so those names resolve while the host
# VPN is up. Either uncomment here, or set `dns:` on the proxy in compose.
# dns_nameservers 10.0.0.53 1.1.1.1

# Standard proxy port
http_port 3128
